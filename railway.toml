[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"
dockerBuildTarget = "production"

[deploy]
startCommand = "node_modules/.bin/prisma migrate deploy && node dist/main"
healthcheckPath = "/api/billing/plans"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
