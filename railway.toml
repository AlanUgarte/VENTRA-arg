[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.api"
dockerBuildTarget = "production"

[deploy]
startCommand = "node dist/main"
healthcheckPath = "/api/billing/plans"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"

[services.variables]
PORT = "4000"
NODE_ENV = "production"
