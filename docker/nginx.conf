# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_default:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

upstream api  { server api:4000;  keepalive 16; }
upstream web  { server web:3000;  keepalive 16; }

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header X-XSS-Protection        "1; mode=block"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── MP Webhook — sin rate limit, firma verificada en backend ────────────
    location = /api/billing/webhook {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # ── Auth endpoints (strict throttle) ─────────────────────────────────────
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 1M;
    }

    # ── API routes ────────────────────────────────────────────────────────────
    location /api {
        limit_req zone=api_default burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  5M;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
