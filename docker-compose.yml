version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: almacen
      POSTGRES_PASSWORD: almacen_dev
      POSTGRES_DB: almacen_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U almacen']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: development
    env_file: .env
    environment:
      DATABASE_URL: postgresql://almacen:almacen_dev@postgres:5432/almacen_db
      PORT: 4000
      NODE_ENV: development
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./prisma:/app/prisma

volumes:
  postgres_data:
